name: Export and Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Godot headless
        run: |
          wget -q "https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_linux.x86_64.zip" -O godot.zip
          unzip -q godot.zip
          chmod +x Godot_v4.6.2-stable_linux.x86_64
          sudo mv Godot_v4.6.2-stable_linux.x86_64 /usr/local/bin/godot

      - name: Download export templates (nothreads)
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.2.stable
          wget -q "https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_export_templates.tpz" -O templates.tpz
          unzip -q templates.tpz -d templates_extracted
          mv templates_extracted/templates/* ~/.local/share/godot/export_templates/4.6.2.stable/

      - name: Export Web (nothreads)
        run: |
          mkdir -p build
          godot --headless --export-release "Web" build/index.html

      - name: Verify export output
        run: |
          test -f build/index.html || (echo "Export failed: build/index.html missing" && exit 1)
          ls build/*.wasm 2>/dev/null || (echo "Export failed: .wasm missing" && exit 1)

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Prepare Vercel Build Output
        run: |
          mkdir -p .vercel/output/static
          cp -r build/* .vercel/output/static/
          cat > .vercel/output/config.json << 'EOF'
          {
            "version": 3,
            "headers": [
              {
                "source": "/(.*)\\.wasm",
                "headers": [
                  { "key": "Content-Type", "value": "application/wasm" }
                ]
              },
              {
                "source": "/(.*)",
                "headers": [
                  { "key": "Cross-Origin-Opener-Policy", "value": "same-origin" },
                  { "key": "Cross-Origin-Embedder-Policy", "value": "require-corp" }
                ]
              }
            ]
          }
          EOF

      - name: Deploy to Vercel
        run: |
          vercel deploy --prebuilt \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --prod \
            --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
